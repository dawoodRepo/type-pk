<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <style>
    .key-bg { fill: #1a1a2e; }
    .key-1 { fill: #4F46E5; opacity: 0.3; }
    .key-2 { fill: #4F46E5; opacity: 0.65; }
    .key-3 { fill: #4F46E5; }
    .key-space { fill: #4F46E5; }

    @media (prefers-color-scheme: dark) {
      .key-bg { fill: #ffffff; opacity: 0.15; }
      .key-1 { fill: #818cf8; opacity: 0.3; }
      .key-2 { fill: #818cf8; opacity: 0.65; }
      .key-3 { fill: #818cf8; }
      .key-space { fill: #818cf8; }
    }
  </style>

  <rect class="key-bg" x="0" y="0" width="32" height="32" rx="6"/>
  <rect class="key-1" x="4" y="5" width="7" height="7" rx="1.5"/>
  <rect class="key-2" x="12.5" y="5" width="7" height="7" rx="1.5"/>
  <rect class="key-3" x="21" y="5" width="7" height="7" rx="1.5"/>
  <rect class="key-space" x="4" y="15" width="24" height="8" rx="2.5"/>
</svg>
